project:
  type: website
  output-dir: _site

metadata:
  author: "Byungkook Oh"

execute:
  freeze: auto

format:
  # https://quarto.org/docs/reference/formats/html.html
  # https://quarto.org/docs/output-formats/html-themes.html
  html:
    fontsize: 16.5px
    toc: true
    toc-title: "On this page"
    toc-location: right
    # number-sections: true
    # code-overflow: wrap
    date-modified: last-modified
    date-format: "YYYY.MM.DD"
    theme:
      light: [flatly, style.scss]  # flatly, cosmo, litera
    grid:
      sidebar-width: 250px
      body-width: 900px
      margin-width: 300px

website:
  title: "Machine Learning"
  # Quarto 빌드 시 canonical URL, sitemap 등의 base URL을 gli.konkuk.ac.kr 기준으로 생성하도록 설정
  site-url: https://gli.konkuk.ac.kr/board/lectures/machine-learning
  navbar:
    left:
      - href: index.qmd
        text: Home
      - href: exercises/index.qmd
        text: Exercises 
      - href: assignments/index.qmd
        text: Assignments
      - icon: link-45deg
        href: http://gli.konkuk.ac.kr
        text: GLI Lab
    tools:
      - icon: github
        href: https://github.com/GLI-Lab/machine-learning-course
        text: Machine Learning Course GitHub

  sidebar:
    - id: exercises
      title: "Exercises"
      style: "floating"
      collapse-level: 2
      contents:
        - section: "Exercises"
          href: exercises/index.qmd
          contents:
            - exercises/environment-setup.qmd
            - section: "Lab1. Introduction to ML"
              contents:
                - text: "Python Basics (⭐)"
                  href: exercises/lab01/python-basics.qmd
                - text: "Numpy Basics (⭐⭐)"
                  href: exercises/lab01/numpy-basics.qmd
                - text: "Matplotlib Basics"
                  href: exercises/lab01/matplotlib-basics.qmd
                - text: "Pandas Basics"
                  href: exercises/lab01/pandas-basics.qmd
            - section: "Lab2. Linear Models"
              contents:
                - text: "Linear Regression"
                  href: exercises/lab02/linear-regression.qmd
                - text: "Logistic Regression"
                  href: exercises/lab02/logistic-regression.qmd
                - text: "Classification Metrics"
                  href: exercises/lab02/classification-metrics.qmd
                - text: "Softmax Regression"
                  href: exercises/lab02/softmax-regression.qmd
            - section: "Lab3. Multi-Layer Perceptron"
              contents:
                - text: "Linear Regression (Scratch)"
                  href: exercises/lab03/linear-regression-scratch.qmd
                - text: "Logistic Regression (Scratch)"
                  href: exercises/lab03/logistic-regression-scratch.qmd
                - text: "Softmax Regression (Scratch)"
                  href: exercises/lab03/softmax-regression-scratch.qmd
            - section: "Lab4. Model Selection and Generalization"
              contents:
                - text: "MLP Regression (Scratch)"
                  href: exercises/lab04/mlp-regression-scratch.qmd
                - text: "MLP Regression-Improved (Scratch)"
                  href: exercises/lab04/mlp-regression-scratch2.qmd
            - section: "Lab5. Convolutional NNs"
              contents:
                - text: "CNN Architecture"
                  href: exercises/lab05/cnn-architecture.qmd
            - section: "Lab6. Recurrent NNs"
              contents:
                - text: "RNN Architecture"
                  href: exercises/lab06/rnn-architecture.qmd
    - id: assignments
      title: "Assignments"
      collapse-level: 1
      align: left
      contents:
        - section: "Assignments"
          href: assignments/index.qmd
          contents:
